defaults:
  api_base: http://127.0.0.1:8000/v1
  context_size: 8192

profiles:
  - id: vllm-qwen3-coder-next-awq
    backend: vllm
    kind: inference
    model: cyankiwi/Qwen3-Coder-Next-REAM-AWQ-4bit
    launch:
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --host
        - 0.0.0.0
        - --port
        - "8000"
        - --model
        - cyankiwi/Qwen3-Coder-Next-REAM-AWQ-4bit
        - --tensor-parallel-size
        - "2"
        - --gpu-memory-utilization
        - "0.92"
        - --max-model-len
        - "8192"
        - --enable-prefix-caching
        - --enable-chunked-prefill
    optimization_tags:
      - awq
      - ream
      - tensor-parallel-2
      - prefix-caching
      - chunked-prefill
      - openai-compatible
  - id: vllm-devstral-small
    backend: vllm
    kind: inference
    model: mistralai/Devstral-Small-2507
    launch:
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --host
        - 0.0.0.0
        - --port
        - "8001"
        - --model
        - mistralai/Devstral-Small-2507
        - --tensor-parallel-size
        - "2"
        - --gpu-memory-utilization
        - "0.92"
        - --max-model-len
        - "8192"
        - --enable-prefix-caching
        - --enable-chunked-prefill
    api_base: http://127.0.0.1:8001/v1
    optimization_tags:
      - coding-specialist
      - tensor-parallel-2
      - prefix-caching
      - chunked-prefill
      - openai-compatible
  - id: vllm-qwen-moe-awq
    backend: vllm
    kind: inference
    model: Qwen/Qwen3.5-35B-A3B-AWQ
    launch:
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --host
        - 0.0.0.0
        - --port
        - "8002"
        - --model
        - Qwen/Qwen3.5-35B-A3B-AWQ
        - --tensor-parallel-size
        - "2"
        - --gpu-memory-utilization
        - "0.92"
        - --max-model-len
        - "8192"
        - --enable-prefix-caching
        - --enable-chunked-prefill
    api_base: http://127.0.0.1:8002/v1
    optimization_tags:
      - awq
      - moe
      - tensor-parallel-2
      - prefix-caching
      - chunked-prefill
  - id: llamacpp-devstral-q4km
    backend: llama.cpp
    kind: inference
    model: /models/devstral-small-2507-q4_k_m.gguf
    api_base: http://127.0.0.1:8080/v1
    launch:
      command:
        - ./llama-server
      args:
        - --host
        - 0.0.0.0
        - --port
        - "8080"
        - --model
        - /models/devstral-small-2507-q4_k_m.gguf
        - --ctx-size
        - "8192"
        - --n-gpu-layers
        - "999"
        - --flash-attn
        - --split-mode
        - row
        - --tensor-split
        - 1,1
        - --parallel
        - "4"
        - --cache-type-k
        - q8_0
        - --cache-type-v
        - q8_0
    optimization_tags:
      - gguf
      - flash-attn
      - row-split
      - q8-kv
      - parallel-4
  - id: qwen3-embedding-4b
    backend: vllm
    kind: embedding
    model: Qwen/Qwen3-Embedding-4B
    api_base: http://127.0.0.1:8100/v1
    launch:
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --host
        - 0.0.0.0
        - --port
        - "8100"
        - --model
        - Qwen/Qwen3-Embedding-4B

workloads:
  - id: json-small
    request:
      temperature: 0
      max_tokens: 160
      response_format:
        type: json_object
      messages:
        - role: system
          content: Return strict JSON only, no prose.
        - role: user
          content: >
            Return a JSON object with keys "status", "changed_files", and "risk".
            Use "ok" for status, an array with ["benchllm/cli.py"], and "low" for risk.
    validations:
      expect_json: true
  - id: code-plan
    request:
      temperature: 0
      max_tokens: 320
      messages:
        - role: system
          content: You are a precise coding assistant.
        - role: user
          content: >
            Propose a concise refactor plan for a Python CLI that loads YAML,
            calls an OpenAI-compatible API, and writes JSON benchmark results.
  - id: shared-prefix-coding
    request:
      temperature: 0
      max_tokens: 256
      messages:
        - role: system
          content: You are a precise coding assistant.
        - role: user
          content: >
            We are benchmarking a local coding model on dual RTX 3090 GPUs.
            Compare prefix caching, chunked prefill, and q8 KV cache tradeoffs for
            8k context, 2-4 concurrent sessions, and JSON reliability.

matrix:
  profiles:
    - vllm-qwen3-coder-next-awq
    - vllm-devstral-small
    - vllm-qwen-moe-awq
    - llamacpp-devstral-q4km
  workloads:
    - json-small
    - code-plan
    - shared-prefix-coding
  concurrencies:
    - 1
    - 2
    - 4
  repetitions: 2
